<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовые Секреты</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #45475a; background-color: #313244; font-size: 16px; color: #fff; outline: none; }
        .search-box button { padding: 12px 20px; border-radius: 10px; border: none; background-color: #89b4fa; color: #11111b; font-size: 18px; cursor: pointer; }
        .main-content { min-height: 200px; display: flex; justify-content: center; align-items: center; border: 2px dashed #45475a; border-radius: 15px; padding: 20px; background-color: #181825; }
        .empty-text { color: #6c7086; font-size: 18px; text-align: center; }
        .project-card { background-color: #313244; border-radius: 12px; padding: 20px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .project-title { margin: 0; color: #f5c2e7; font-size: 20px; word-break: break-all; }
        .role-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        .role-owner { background-color: #a6e3a1; color: #11111b; }
        .role-guest { background-color: #fab387; color: #11111b; }
        audio { width: 100%; margin: 15px 0; }
        .card-actions { display: flex; gap: 10px; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-copy { background-color: #a6e3a1; color: #11111b; }
        .btn-edit { background-color: #89b4fa; color: #11111b; }
        .btn-delete { background-color: #f38ba8; color: #11111b; flex: 0 0 45px; font-size: 16px; }
        .bottom-bar { margin-top: 20px; display: flex; justify-content: center; }
        .create-btn { background-color: #f38ba8; color: #11111b; font-size: 18px; font-weight: bold; padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(243, 139, 168, 0.4); }
        .recording-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(24, 24, 37, 0.97); border-radius: 15px; flex-direction: column; justify-content: center; align-items: center; z-index: 10; height: 100%; min-height: 300px;}
        .desc-input-box { margin-bottom: 25px; width: 80%; text-align: center; }
        .desc-input-box input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #45475a; background-color: #313244; color: white; font-size: 16px; text-align: center; }
        .desc-input-box small { color: #6c7086; display: block; margin-top: 5px; }
        .waves-container { display: flex; align-items: center; gap: 5px; height: 60px; margin-bottom: 30px; }
        .wave-bar { width: 6px; height: 10px; background-color: #f38ba8; border-radius: 3px; animation: bounce 0.5s ease-in-out infinite alternate; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        @keyframes bounce { 100% { height: 60px; } }
        .stop-btn { background-color: #f38ba8; color: #11111b; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Вставь код друга сюда...">
        <button onclick="searchProject()">🔍</button>
    </div>
    <div class="main-content" id="mainContent">
        <div class="empty-text" id="emptyText">Пока проектов нет</div>
    </div>
    <div class="recording-overlay" id="recordingOverlay">
        <div class="desc-input-box">
            <label style="color: #cdd6f4; display:block; margin-bottom:8px;">Описание проекта (макс. 15 символов):</label>
            <input type="text" id="projectDescription" maxlength="15" placeholder="Например: Мой стих">
            <small id="charCount">Осталось символов: 15</small>
        </div>
        <h3 style="color: #f38ba8; margin: 0 0 15px 0;">Идет запись голоса...</h3>
        <div class="waves-container"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
        <button class="stop-btn" onclick="stopRecording()">Остановить и Выложить</button>
    </div>
    <div class="bottom-bar">
        <button class="create-btn" onclick="openRecordingScreen()">Создать</button>
    </div>
<script>
    let mediaRecorder; let audioChunks = [];
    document.getElementById('projectDescription').oninput = function() {
        let left = 15 - this.value.length;
        document.getElementById('charCount').innerText = "Осталось символов: " + left;
    };
    window.onload = function() { loadSavedProject(); }
    function loadSavedProject() {
        const savedAudio = localStorage.getItem('myAudioData');
        const savedDesc = localStorage.getItem('myAudioDesc') || "Без названия";
        if (savedAudio) { showProjectCard(savedAudio, savedDesc, true); } 
        else { document.getElementById('mainContent').innerHTML = '<div class="empty-text" id="emptyText">Пока проектов нет</div>'; }
    }
    async function openRecordingScreen() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('projectDescription').value = "";
            document.getElementById('charCount').innerText = "Осталось символов: 15";
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const reader = new FileReader(); reader.readAsDataURL(audioBlob); 
                reader.onloadend = () => {
                    const base64Audio = reader.result;
                    let desc = document.getElementById('projectDescription').value.trim();
                    if(!desc) desc = "Голосовое";
                    const finalCode = desc + "|||" + base64Audio;
                    localStorage.setItem('myAudioData', finalCode);
                    localStorage.setItem('myAudioDesc', desc);
                    showProjectCard(finalCode, desc, true);
                }
            };
            document.getElementById('recordingOverlay').style.display = 'flex';
            mediaRecorder.start();
        } catch (err) { alert('Ошибка: Включи микрофон в браузере!'); }
    }
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop(); document.getElementById('recordingOverlay').style.display = 'none';
        }
    }
    function showProjectCard(fullCode, description, isOwner) {
        const mainContent = document.getElementById('mainContent');
        let audioSrc = fullCode;
        if(fullCode.includes("|||")) { audioSrc = fullCode.split("|||")[1]; }
        let badge = isOwner ? '<span class="role-badge role-owner">Ты автор</span>' : '<span class="role-badge role-guest">Проект друга</span>';
        let audioHTML = audioSrc ? `<audio src="${audioSrc}" controls></audio>` : `<p style="color:#f38ba8;">Ошибка воспроизведения</p>`;
        let ActionButtons = isOwner ? `
            <button class="btn btn-edit" onclick="editDescription()">Изменить имя</button>
            <button class="btn btn-copy" onclick="copyCode('${fullCode}')">Скопировать код</button>
        ` : `<div style="color:#6c7086; font-size:13px; padding:5px;">Редактирование запрещено автором</div>`;
        mainContent.innerHTML = `
            <div class="project-card">
                <div class="project-header"><h3 class="project-title">${description}</h3>${badge}</div>
                ${audioHTML}
                <div class="card-actions">${ActionButtons}<button class="btn btn-delete" onclick="deleteProject(${isOwner})">🗑️</button></div>
            </div>
        `;
    }
    function editDescription() {
        let currentDesc = localStorage.getItem('myAudioDesc') || "Голосовое";
        let newDesc = prompt("Введите новое описание (не более 15 символов):", currentDesc);
        if (newDesc === null) return;
        newDesc = newDesc.trim();
        if (newDesc.length > 15 || newDesc.length === 0) { alert("Ошибка: Неверная длина текста (1-15 символов)!"); return; }
        let fullCode = localStorage.getItem('myAudioData');
        let audioSrc = fullCode.split("|||")[1];
        let newFullCode = newDesc + "|||" + audioSrc;
        localStorage.setItem('myAudioData', newFullCode); localStorage.setItem('myAudioDesc', newDesc);
        showProjectCard(newFullCode, newDesc, true);
    }
    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => { alert('Код скопирован!'); });
    }
    function deleteProject(isOwner) {
        if (confirm("Вы точно хотите удалить этот проект?")) {
            if(isOwner) { localStorage.removeItem('myAudioData'); localStorage.removeItem('myAudioDesc'); }
            loadSavedProject();
        }
    }
    function searchProject() {
        const rawCode = document.getElementById('searchInput').value.trim();
        if (!rawCode) { alert('Ошибка: Строка поиска пуста!'); return; }
        if (rawCode.includes("|||") && rawCode.includes("data:audio")) {
            let parts = rawCode.split("|||"); showProjectCard(rawCode, parts[0], false);
        } else if (rawCode.startsWith("data:audio")) {
            showProjectCard(rawCode, "Чужой проект", false);
        } else { alert('Ошибка: Это неправильный код!'); }
    }
</script>
</body>
</html>

</div>
